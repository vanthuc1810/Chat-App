name: Linting
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  eslint-review:
    name: runner / eslint
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Quyền tối thiểu cần thiết để comment vào PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Caching tự động cho npm (tối ưu hóa bước install)

      - name: Install dependencies
        run: npm ci # Dùng 'ci' thay cho 'install' để đảm bảo tính ổn định và tốc độ

      - name: Run ESLint with Reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review # Comment trực tiếp trên dòng code
          filter_mode: added # Chỉ báo lỗi trên code mới thêm
          fail_level: true # Chỉ fail build khi có lỗi 'error'
          eslint_flags: "."
